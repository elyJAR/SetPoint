<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SetPoint</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      background: #f4f5f7;
      color: #1a1d23;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app-wrapper {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px 48px;
    }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 20px 0 18px;
      border-bottom: 2px solid #d0d4dc;
      margin-bottom: 28px;
    }
    .app-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #1a1d23;
      min-width: 120px;
    }
    .app-title span {
      color: #2563eb;
    }
    .app-subtitle {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
      font-weight: 400;
      letter-spacing: 0.02em;
    }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Buttons ── */
    button, .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center; /* Added to center text when width is 100% */
      gap: 6px;
      padding: 10px 16px; /* Slightly taller for better touch */
      border-radius: 5px;
      border: 1px solid transparent;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
    .btn-secondary {
      background: #fff;
      color: #374151;
      border-color: #d1d5db;
    }
    .btn-secondary:hover { background: #f9fafb; border-color: #9ca3af; }
    .btn-danger {
      background: #fff;
      color: #dc2626;
      border-color: #fca5a5;
    }
    .btn-danger:hover { background: #fef2f2; }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    button:disabled, button[disabled] {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* ── Cards / Sections ── */
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: #6b7280;
      margin-bottom: 16px;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .form-row:last-child { border-bottom: none; }
    .form-row input[type="text"],
    .form-row input[type="number"] {
      height: 36px;
      padding: 0 10px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      font-size: 13px;
      color: #1a1d23;
      background: #fafafa;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-row input[type="text"]:focus,
    .form-row input[type="number"]:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.12);
      background: #fff;
    }
    .input-label { width: 160px; }
    .input-casting-date { width: 130px; }
    .input-offset { width: 70px; }
    .input-custom-duration { width: 110px; }
    .extra-durations {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .extra-durations .input-custom-duration { width: 110px; }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .checkbox-divider {
      width: 1px;
      height: 18px;
      background: #d1d5db;
      flex-shrink: 0;
    }
    .checkbox-select-all {
      font-weight: 600;
      color: #2563eb;
    }
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      user-select: none;
    }
    .checkbox-label input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #2563eb;
      cursor: pointer;
    }
    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid #f3f4f6;
    }

    /* ── Import Panel ── */
    .import-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }
    .import-row label {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }
    input[type="file"] {
      font-size: 13px;
      color: #374151;
      cursor: pointer;
    }
    .link-btn {
      font-size: 13px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 0;
      border-bottom: 1px dashed #93c5fd;
      transition: color 0.15s;
    }
    .link-btn:hover { color: #1d4ed8; border-bottom-color: #2563eb; }

    /* ── Banner ── */
    #banner-container { 
      margin-bottom: 16px; 
      position: relative;
      z-index: 1050;
    }
    .banner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 13px;
      margin-bottom: 8px;
      line-height: 1.5;
    }
    .banner--error   { background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
    .banner--warning { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
    .banner--info    { background: #eff6ff; border-color: #93c5fd; color: #1e40af; }
    .banner-dismiss {
      background: none;
      border: none;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      color: inherit;
      opacity: 0.6;
      padding: 0 2px;
      flex-shrink: 0;
    }
    .banner-dismiss:hover { opacity: 1; }

    /* ── Schedule Table ── */
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .schedule-table thead tr {
      background: #f8f9fb;
    }
    .schedule-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      border-bottom: 2px solid #e5e7eb;
      white-space: nowrap;
    }
    .schedule-table td {
      padding: 10px 14px;
      border-bottom: 1px solid #f3f4f6;
      vertical-align: middle;
    }
    .schedule-table tbody tr:last-child td { border-bottom: none; }
    .schedule-table tbody tr:hover { background: #f9fafb; }

    /* ── Next Crush Countdown ── */
    .next-crush-card {
      background: linear-gradient(135deg, #1e40af 0%, #2563eb 100%);
      color: #fff;
      border-radius: 8px;
      padding: 28px 32px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: sticky;
      top: 16px;
      z-index: 100;
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4), 0 8px 10px -6px rgba(37, 99, 235, 0.1);
    }
    .next-crush-card .card-title {
      color: rgba(255,255,255,0.7);
      margin-bottom: 12px;
    }
    .next-crush-number {
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -2px;
      margin-bottom: 10px;
    }
    .next-crush-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      font-weight: 400;
    }

    /* ── Days Left ── */
    .days-left {
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }
    .days-left--future { color: #2563eb; }
    .days-left--today  { color: #16a34a; }
    .days-left--past   { color: #dc2626; }

    /* ── Row Status ── */
    tr.row--crushed   { background: #f3f4f6; opacity: 0.6; }
    tr.row--crushed td { text-decoration: line-through; }
    tr.row--crushed td.days-left, 
    tr.row--crushed td:first-child,
    tr.row--crushed td:last-child { text-decoration: none; }
    .days-left--crushed { color: #6b7280; }

    tr.row--past   { background: #fff5f5; }
    tr.row--past:hover { background: #fee2e2; }
    tr.row--today  { background: #f0fdf4; }
    tr.row--today:hover { background: #dcfce7; }
    tr.row--future { background: #fff; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 14px;
    }

    /* ── Inline Edit ── */
    .inline-edit {
      padding: 12px 14px;
      background: #f8f9fb;
    }
    .inline-edit label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 12px;
      font-size: 13px;
    }
    .inline-edit input {
      height: 32px;
      padding: 0 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
    }
    .btn-confirm-edit {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      margin-right: 6px;
    }
    .btn-cancel-edit {
      background: #fff;
      color: #374151;
      border: 1px solid #d1d5db;
      padding: 6px 14px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-close {
      background: none;
      border: none;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: #9ca3af;
      padding: 0 4px;
    }
    .btn-close:hover { color: #4b5563; }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-content {
      width: 100%;
      max-width: 650px;
      max-height: 90vh;
      overflow-y: auto;
      margin: 0;
    }

    /* ── Mobile Responsiveness ── */
    @media (max-width: 768px) {
      .app-wrapper { padding: 0 12px 32px; }
      .app-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }
      .header-actions {
        width: 100%;
        justify-content: flex-start;
        gap: 8px;
      }
      .form-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        padding: 20px 0;
        width: 100%;
      }
      .input-label, .input-casting-date, .input-offset {
        width: 100% !important;
        max-width: 100%;
      }
      .checkbox-group {
        flex-wrap: wrap;
        gap: 10px;
        padding: 8px 0;
        width: 100%;
      }
      .checkbox-divider { display: none; }
      #schedule-container {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .schedule-table th {
        white-space: normal !important;
      }
      .next-crush-number {
        font-size: 44px;
        word-break: break-word;
      }
      .form-actions {
        flex-direction: column;
        gap: 12px;
      }
      .form-actions button { width: 100%; }
      .header-actions .btn {
        padding: 8px 10px;
      }
      .header-actions .btn-label {
        display: none;
      }
    }
    @media (max-width: 480px) {
      .card { padding: 16px; }
      .next-crush-card { padding: 24px 16px; }
      .next-crush-number { font-size: 34px; }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">

    <header class="app-header">
      <div style="display: flex; flex-direction: column; gap: 6px;">
        <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
          <div class="app-title">Set<span>Point</span></div>
          <div id="auth-section" style="display: flex; gap: 10px; align-items: center; border-left: 1px solid #d1d5db; padding-left: 16px;">
            <span id="user-info" style="font-size: 13px; color: #4b5563; display: none;"></span>
            <button id="btn-login" class="btn btn-primary btn-sm">Sign In</button>
            <button id="btn-logout" class="btn btn-secondary btn-sm" style="display: none;">Sign Out</button>
            <button id="btn-share" class="btn btn-secondary btn-sm" style="display: none;" title="Share this schedule">🔗 Share</button>
          </div>
        </div>
        <div class="app-subtitle">Concrete Curing Schedule Tracker</div>
      </div>
      <div class="header-actions" style="flex-wrap: nowrap;">
        <button id="btn-open-add-modal" class="btn btn-primary" title="Add Samples">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
          <span class="btn-label">Add Samples</span>
        </button>
        <button id="btn-open-import-modal" class="btn btn-secondary" title="Import / Export Data">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"></path></svg>
          <span class="btn-label">Data</span>
        </button>
        <button id="btn-export-csv" class="btn btn-secondary" disabled title="Export CSV">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><path d="M14 2v6h6M8 13h8M8 17h8M8 9h2"></path></svg>
          <span class="btn-label">CSV</span>
        </button>
        <button id="btn-export-pdf" class="btn btn-secondary" disabled title="Export PDF">
          <svg style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path><path d="M14 2v6h6M10 18v-4a2 2 0 114 0v4M10 18h4"></path></svg>
          <span class="btn-label">PDF</span>
        </button>
      </div>
    </header>

    <!-- Banner container (populated by showBanner) -->
    <div id="banner-container"></div>

    <!-- Next Crush Countdown -->
    <section id="next-crush-section" class="next-crush-card" style="display:none">
      <div class="card-title">Next Crushing Date</div>
      <div id="next-crush-container"></div>
    </section>

    <!-- Entry Form Modal -->
    <div id="add-samples-modal" class="modal-backdrop" style="display: none;">
      <section class="card modal-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <div class="card-title" style="margin-bottom: 0;">Add Samples</div>
          <button type="button" id="btn-close-modal" class="btn-close" aria-label="Close">&times;</button>
        </div>
      <form id="sample-form" novalidate>
        <div id="form-rows">
          <!-- Initial form row -->
          <div class="form-row" data-index="0">
            <input
              type="text"
              class="input-label"
              name="sample_label_0"
              placeholder="Sample label e.g. Beam-01"
              aria-label="Sample label"
            />
            <input
              type="text"
              class="input-casting-date"
              name="casting_date_0"
              placeholder="DD/MM/YYYY"
              aria-label="Casting date"
            />
            <input
              type="number"
              class="input-offset"
              name="curing_offset_0"
              value="0"
              min="0"
              placeholder="Offset"
              title="Curing start delay (days after casting)"
            />
            <div class="checkbox-group">
              <label class="checkbox-label checkbox-select-all" title="Select All"><input type="checkbox" class="duration-select-all" /> All</label>
              <span class="checkbox-divider"></span>
              <label class="checkbox-label"><input type="checkbox" class="duration-checkbox" value="7" /> 7d</label>
              <label class="checkbox-label"><input type="checkbox" class="duration-checkbox" value="14" /> 14d</label>
              <label class="checkbox-label"><input type="checkbox" class="duration-checkbox" value="21" /> 21d</label>
              <label class="checkbox-label"><input type="checkbox" class="duration-checkbox" value="28" /> 28d</label>
              <label class="checkbox-label"><input type="checkbox" class="duration-checkbox" value="56" /> 56d</label>
              <label class="checkbox-label"><input type="checkbox" class="duration-checkbox" value="90" /> 90d</label>
            </div>
            <button type="button" class="btn-remove-row btn btn-danger btn-sm" style="display:none" aria-label="Remove this row">
              Remove
            </button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-add-row" class="btn btn-secondary">+ Add Another Row</button>
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </form>
    </section>
  </div>

    <!-- Import Panel Modal -->
    <div id="import-export-modal" class="modal-backdrop" style="display: none;">
      <section class="card modal-content" style="max-width: 500px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <div class="card-title" style="margin-bottom: 0;">Import / Export Data</div>
          <button type="button" id="btn-close-import-modal" class="btn-close" aria-label="Close">&times;</button>
        </div>
        <div class="import-row" style="margin-bottom: 12px; display: flex; align-items: center; gap: 14px;">
          <label for="csv-file-input" style="width: 100px;">Import CSV:</label>
          <input type="file" id="csv-file-input" accept=".csv" />
          <a href="#" id="btn-download-template" class="link-btn">Download CSV Template</a>
        </div>
        <div class="import-row" style="display: flex; align-items: center; gap: 14px;">
          <label for="json-file-input" style="width: 100px;">Restore JSON:</label>
          <input type="file" id="json-file-input" accept=".json" />
          <a href="#" id="btn-export-json" class="link-btn">Backup to JSON</a>
        </div>
      </section>
    </div>

    <!-- Schedule Table -->
    <section class="card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px;">
        <div style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
          <div class="card-title" style="margin-bottom: 0;">Crush Schedule</div>
          <label style="font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; color: #4b5563;">
            <input type="checkbox" id="cb-group-by-name" style="width: 15px; height: 15px; accent-color: #2563eb;" />
            Group by Name
          </label>
        </div>
        <button id="btn-batch-delete" class="btn btn-danger btn-sm" style="display: none;">Batch Delete</button>
      </div>
      <div id="schedule-container">
        <p class="empty-state">No samples yet. Add a sample above to get started.</p>
      </div>
    </section>

  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
