name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Rename APK
        working-directory: ./android/app/build/outputs/apk/debug
        run: mv app-debug.apk SetPoint.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SetPoint.apk
          path: android/app/build/outputs/apk/debug/SetPoint.apk

      - name: Create or Update GitHub Pre-Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest release (ignoring 404 if it doesn't exist)
          gh release delete latest --cleanup-tag -y || true
          
          # Create a new pre-release tagged "latest"
          gh release create latest \
            android/app/build/outputs/apk/debug/SetPoint.apk \
            --title "Latest Pre-release Build" \
            --notes "Automated Android APK build from the latest commit (${{ github.sha }})." \
            --prerelease \
            --target main
