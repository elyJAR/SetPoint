name: Build and Release Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      VITE_FIREBASE_API_KEY: "AIzaSyBFNXQjtrIdfOxdFcw8q1q14KKSsIsA8mI"
      VITE_FIREBASE_AUTH_DOMAIN: "setpoint-c.firebaseapp.com"
      VITE_FIREBASE_PROJECT_ID: "setpoint-c"
      VITE_FIREBASE_STORAGE_BUCKET: "setpoint-c.firebasestorage.app"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "366233977678"
      VITE_FIREBASE_APP_ID: "1:366233977678:web:d291ad6a1fa17db078941f"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web App
        run: npm run build

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradlew Executable
        run: sudo apt-get update && sudo apt-get install -y dos2unix && dos2unix android/gradlew && chmod +x android/gradlew

      - name: Setup Debug Keystore
        run: |
          mkdir -p ~/.android
          mkdir -p ~/.config/.android
          if [ -n "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" ]; then
            echo "Restoring keystore from secret..."
            echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore
          else
            echo "Generating new keystore (first run)..."
            keytool -genkey -v -keystore ~/.android/debug.keystore -alias AndroidDebugKey -storepass android -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            echo "=== BASE64 KEYSTORE (save this as DEBUG_KEYSTORE_BASE64 secret) ==="
            base64 -w 0 ~/.android/debug.keystore
            echo ""
            echo "=== SHA-1 FINGERPRINT (register this in Firebase Console) ==="
            keytool -list -v -keystore ~/.android/debug.keystore -alias AndroidDebugKey -storepass android | grep "SHA1:"
          fi
          cp ~/.android/debug.keystore ~/.config/.android/debug.keystore

      - name: Build APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Rename APK
        working-directory: ./android/app/build/outputs/apk/debug
        run: mv app-debug.apk SetPoint.apk

      - name: Create or Update GitHub Pre-Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch the latest release (ignoring 404 if it doesn't exist)
          gh release delete latest --cleanup-tag -y || true
          
          # Create a new pre-release tagged "latest"
          gh release create latest \
            android/app/build/outputs/apk/debug/SetPoint.apk \
            --title "Latest Pre-release Build" \
            --notes "Automated Android APK build from the latest commit (${{ github.sha }})." \
            --prerelease \
            --target main
